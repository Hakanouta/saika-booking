<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>彩華摄影档案</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAFAFA;--card:#FFFFFF;--text:#1A1A1A;--text2:#6B6B6B;--text3:#999;
  --border:#E8E8E8;--accent:#1A1A1A;--accent-hover:#333;--tag-bg:#F3F3F3;
  --green:#2D8659;--green-bg:#EDF7F0;--amber:#D4732A;--amber-bg:#FDF3E8;
  --red:#C0392B;--red-bg:#FDECEA;--blue:#2563EB;--blue-bg:#EFF4FF;
  --radius:8px;--transition:.15s ease;--shadow:0 1px 3px rgba(0,0,0,.06);
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased}
#app{display:flex;min-height:100vh}
/* Sidebar */
.sidebar{width:220px;background:var(--card);border-right:1px solid var(--border);padding:20px 0;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:10}
.sidebar-logo{padding:0 20px 20px;border-bottom:1px solid var(--border);margin-bottom:12px}
.sidebar-logo h1{font-size:16px;font-weight:800;letter-spacing:-.3px}
.sidebar-logo p{font-size:11px;color:var(--text3);margin-top:2px;letter-spacing:1px}
.sidebar-nav{flex:1;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13px;color:var(--text2);cursor:pointer;transition:var(--transition);border:none;background:none;width:100%;text-align:left;font-family:inherit;font-weight:500}
.nav-item:hover{color:var(--text);background:var(--tag-bg)}
.nav-item.active{color:var(--accent);background:var(--tag-bg);font-weight:600}
.nav-item .icon{font-size:15px;width:20px;text-align:center}
.nav-item .badge{font-size:10px;background:var(--accent);color:#fff;border-radius:10px;padding:1px 7px;margin-left:auto;font-weight:600}
.sidebar-stats{padding:14px 20px;border-top:1px solid var(--border);margin-top:auto}
.stat-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px}
.stat-row span:last-child{color:var(--text);font-weight:700;font-size:13px}
/* Main */
.main{flex:1;margin-left:220px;padding:28px 36px;max-width:1100px}
.main-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.main-header h2{font-size:22px;font-weight:800;letter-spacing:-.5px}
.header-actions{display:flex;gap:8px}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;font-size:12px;font-weight:600;border-radius:var(--radius);border:1px solid transparent;cursor:pointer;transition:var(--transition);font-family:inherit;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent-hover)}
.btn-secondary{background:var(--card);color:var(--text);border-color:var(--border)}
.btn-secondary:hover{background:var(--tag-bg)}
.btn-ghost{background:transparent;color:var(--text2);border:none;padding:6px 10px}
.btn-ghost:hover{color:var(--text)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-danger{color:var(--red);border-color:var(--red);background:transparent}
.btn-danger:hover{background:var(--red);color:#fff}
/* Dashboard cards */
.dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.dash-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px}
.dash-card .dc-icon{font-size:22px;margin-bottom:8px}
.dash-card .dc-value{font-size:26px;font-weight:800;letter-spacing:-.5px}
.dash-card .dc-label{font-size:11px;color:var(--text3);margin-top:2px}
.dash-card .dc-sub{font-size:11px;color:var(--text2);margin-top:4px}
.dash-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.dash-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px}
.dash-panel h3{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.dash-panel h3 .count{font-size:11px;color:var(--text3);font-weight:400}
/* List items */
.list-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.list-item:last-child{border-bottom:none}
.list-item .li-date{font-size:11px;color:var(--text3);width:50px;flex-shrink:0}
.list-item .li-name{font-weight:600;flex-shrink:0}
.list-item .li-desc{color:var(--text2);font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.list-item .li-tag{font-size:10px;padding:2px 6px;border-radius:4px;flex-shrink:0}
/* Tags */
.tag{font-size:11px;padding:2px 7px;border-radius:4px;background:var(--tag-bg);color:var(--text2);white-space:nowrap}
.tag-green{color:var(--green);background:var(--green-bg)}
.tag-amber{color:var(--amber);background:var(--amber-bg)}
.tag-red{color:var(--red);background:var(--red-bg)}
.tag-blue{color:var(--blue);background:var(--blue-bg)}
.tag-accent{background:var(--accent);color:#fff}
/* Calendar */
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.cal-header h3{font-size:18px;font-weight:700}
.cal-nav{display:flex;gap:6px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-weekday{text-align:center;font-size:11px;color:var(--text3);padding:6px 0;font-weight:600}
.cal-day{aspect-ratio:1;border:1px solid var(--border);border-radius:6px;padding:6px;font-size:12px;cursor:pointer;transition:var(--transition);position:relative;min-height:64px;background:var(--card)}
.cal-day:hover{border-color:var(--accent)}
.cal-day.other{opacity:.35}
.cal-day.today{border-color:var(--accent);border-width:2px}
.cal-day.has-event{background:var(--blue-bg);border-color:var(--blue)}
.cal-day .cd-num{font-weight:600}
.cal-day .cd-events{margin-top:2px;display:flex;flex-direction:column;gap:1px}
.cal-day .cd-event{font-size:9px;color:var(--blue);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:1px 3px;background:rgba(37,99,235,.1);border-radius:2px}
.cal-day-detail{margin-top:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px}
.cal-day-detail h4{font-size:14px;font-weight:700;margin-bottom:10px}
/* Project cards */
.project-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.project-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;transition:var(--transition);cursor:pointer;position:relative}
.project-card:hover{border-color:#ccc;box-shadow:var(--shadow)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.card-title{font-size:15px;font-weight:700;line-height:1.3}
.card-subtitle{font-size:12px;color:var(--text2);margin-top:2px}
.card-menu{font-size:16px;color:var(--text3);cursor:pointer;padding:2px 6px;border-radius:4px;border:none;background:none}
.card-menu:hover{background:var(--tag-bg);color:var(--text)}
.card-meta{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.card-wf{margin-bottom:10px}
.wf-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.wf-stages{display:flex;align-items:center;gap:3px}
.wf-dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0}
.wf-dot.done{background:var(--green)}
.wf-dot.active{background:var(--amber)}
.wf-line{flex:1;height:1px;background:var(--border);min-width:12px}
.wf-line.done{background:var(--green)}
.card-fin{display:flex;justify-content:space-between;font-size:12px;padding-top:8px;border-top:1px solid var(--border)}
.card-fin .fin-label{color:var(--text3)}
.card-fin .fin-value{font-weight:600}
.card-fin .fin-paid{color:var(--green)}
.card-fin .fin-unpaid{color:var(--amber)}
/* Toolbar */
.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:180px;max-width:320px;position:relative}
.search-box input{width:100%;padding:8px 12px 8px 32px;font-size:12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--card);font-family:inherit;outline:none;transition:var(--transition)}
.search-box input:focus{border-color:var(--accent)}
.search-box .si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px}
.filter-group{display:flex;gap:4px;flex-wrap:wrap}
.filter-chip{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;transition:var(--transition);font-family:inherit}
.filter-chip:hover{border-color:var(--accent);color:var(--text)}
.filter-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding-top:30px;overflow-y:auto;backdrop-filter:blur(2px)}
.modal{background:var(--card);border-radius:10px;width:100%;max-width:680px;max-height:92vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.12);margin-bottom:30px}
.modal-lg{max-width:860px}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:18px 24px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card);z-index:1}
.modal-header h3{font-size:17px;font-weight:700}
.modal-body{padding:22px 24px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:14px 24px;border-top:1px solid var(--border);position:sticky;bottom:0;background:var(--card)}
.close-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:none;background:var(--tag-bg);border-radius:50%;cursor:pointer;font-size:16px;color:var(--text2);transition:var(--transition)}
.close-btn:hover{background:var(--border);color:var(--text)}
/* Form */
.form-section{margin-bottom:20px}
.form-section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-row.cols-3{grid-template-columns:1fr 1fr 1fr}
.form-row.cols-1{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:3px}
.form-group label{font-size:11px;font-weight:600;color:var(--text2)}
.form-group input,.form-group select,.form-group textarea{padding:7px 10px;font-size:12px;border:1px solid var(--border);border-radius:var(--radius);font-family:inherit;outline:none;background:var(--card);transition:var(--transition)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{resize:vertical;min-height:50px}
.form-group .hint{font-size:10px;color:var(--text3)}
/* Workflow form */
.wf-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px}
.wf-row .wf-name{width:60px;font-size:11px;color:var(--text2);flex-shrink:0;font-weight:600}
.wf-row input[type="number"]{width:50px;padding:4px 6px;font-size:11px;border:1px solid var(--border);border-radius:4px;text-align:center}
.wf-row input[type="checkbox"]{width:15px;height:15px;cursor:pointer}
.wf-row .wf-unit{font-size:10px;color:var(--text3)}
.wf-row .wf-done-label{font-size:10px;color:var(--text3);cursor:pointer}
/* Platform checkboxes */
.platform-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.platform-item{display:flex;align-items:center;gap:5px;font-size:12px;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:var(--transition);background:var(--card);user-select:none}
.platform-item:hover{border-color:var(--accent)}
.platform-item.checked{background:var(--accent);color:#fff;border-color:var(--accent)}
.platform-item input{display:none}
/* Mood board */
.mood-section{margin-bottom:16px}
.mood-section-title{font-size:12px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.mood-upload{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.mood-slot{aspect-ratio:1;border:1px dashed var(--border);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:var(--transition);overflow:hidden;position:relative;background:var(--tag-bg)}
.mood-slot:hover{border-color:var(--accent)}
.mood-slot img{width:100%;height:100%;object-fit:cover}
.mood-slot .ms-label{font-size:10px;color:var(--text3);text-align:center;padding:4px}
.mood-slot .ms-remove{position:absolute;top:2px;right:2px;width:18px;height:18px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center}
.mood-keywords{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.mood-keyword{font-size:11px;padding:3px 8px;border-radius:12px;background:var(--tag-bg);color:var(--text);display:flex;align-items:center;gap:4px}
.mood-keyword .mk-remove{cursor:pointer;color:var(--text3);font-size:10px}
.mood-keyword .mk-remove:hover{color:var(--red)}
.keyword-input{padding:5px 8px;font-size:11px;border:1px solid var(--border);border-radius:4px;width:80px;outline:none;font-family:inherit}
.keyword-input:focus{border-color:var(--accent)}
/* Finance */
.fin-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.fin-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px}
.fin-card .fc-label{font-size:11px;color:var(--text3);margin-bottom:4px}
.fin-card .fc-value{font-size:22px;font-weight:800;letter-spacing:-.3px}
.fin-card .fc-sub{font-size:11px;color:var(--text2);margin-top:3px}
.fin-chart{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px}
.fin-chart h3{font-size:14px;font-weight:700;margin-bottom:16px}
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:160px;padding-bottom:24px;position:relative}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative}
.bar{width:100%;max-width:40px;background:var(--accent);border-radius:4px 4px 0 0;transition:height .3s ease;min-height:2px;cursor:pointer}
.bar:hover{opacity:.8}
.bar-label{font-size:10px;color:var(--text3);position:absolute;bottom:-18px}
.bar-val{font-size:10px;color:var(--text);font-weight:600;position:absolute;top:-16px;white-space:nowrap}
.fin-table{width:100%;border-collapse:collapse;font-size:12px}
.fin-table th{text-align:left;padding:8px 10px;border-bottom:2px solid var(--border);font-size:11px;color:var(--text3);font-weight:600}
.fin-table td{padding:8px 10px;border-bottom:1px solid var(--border)}
.fin-table .td-paid{color:var(--green);font-weight:600}
.fin-table .td-unpaid{color:var(--amber);font-weight:600}
/* Settings */
.settings-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin-bottom:14px}
.settings-section h3{font-size:14px;font-weight:700;margin-bottom:10px}
.settings-section p{font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:8px}
.settings-section code{background:var(--tag-bg);padding:2px 6px;border-radius:3px;font-size:11px;font-family:"SF Mono","Fira Code","Consolas",monospace}
.guide-folder{background:var(--tag-bg);border-radius:var(--radius);padding:14px;font-family:"SF Mono","Fira Code","Consolas",monospace;font-size:11px;line-height:1.8;overflow-x:auto;white-space:pre;color:var(--text);margin-top:8px}
/* Toast */
.toast{position:fixed;bottom:28px;right:28px;padding:10px 18px;border-radius:var(--radius);background:var(--accent);color:#fff;font-size:12px;font-weight:600;z-index:200;animation:slideIn .3s ease;box-shadow:0 4px 12px rgba(0,0,0,.15)}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.toast-out{animation:slideOut .3s ease forwards}
@keyframes slideOut{to{transform:translateY(20px);opacity:0}}
/* Empty */
.empty-state{text-align:center;padding:50px 20px;color:var(--text2)}
.empty-state .ei{font-size:40px;margin-bottom:10px;opacity:.3}
.empty-state h3{font-size:16px;color:var(--text);margin-bottom:4px}
.empty-state p{font-size:12px;margin-bottom:14px}
/* Dropdown */
.dropdown{position:absolute;top:34px;right:0;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:10;min-width:130px;overflow:hidden}
.dropdown button{display:block;width:100%;text-align:left;padding:8px 14px;font-size:12px;border:none;background:none;cursor:pointer;font-family:inherit;transition:var(--transition)}
.dropdown button:hover{background:var(--tag-bg)}
.dropdown button.danger{color:var(--red)}
/* Photo select page */
.ps-info{background:var(--blue-bg);border:1px solid var(--blue);border-radius:var(--radius);padding:10px 14px;font-size:12px;color:var(--blue);margin-bottom:12px}
/* Responsive */
@media(max-width:768px){
  .sidebar{display:none}
  .main{margin-left:0;padding:16px}
  .form-row,.form-row.cols-3{grid-template-columns:1fr}
  .project-grid{grid-template-columns:1fr}
  .dash-grid{grid-template-columns:1fr 1fr}
  .dash-row{grid-template-columns:1fr}
  .fin-summary{grid-template-columns:1fr 1fr}
  .mood-upload{grid-template-columns:1fr 1fr}
}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h1>彩華摄影档案</h1>
      <p>SAIKA STUDIO</p>
    </div>
    <nav class="sidebar-nav" id="sidebarNav">
      <button class="nav-item active" data-view="dashboard"><span class="icon">📊</span>仪表盘</button>
      <button class="nav-item" data-view="schedule"><span class="icon">📅</span>日程</button>
      <button class="nav-item" data-view="projects"><span class="icon">📁</span>项目<span class="badge" id="navBadge">0</span></button>
      <button class="nav-item" data-view="finance"><span class="icon">💰</span>财务</button>
      <button class="nav-item" data-view="settings"><span class="icon">⚙️</span>设置</button>
    </nav>
    <div class="sidebar-stats">
      <div class="stat-row"><span>本月收入</span><span id="sbIncome">¥0</span></div>
      <div class="stat-row"><span>本月接单</span><span id="sbOrders">0</span></div>
      <div class="stat-row"><span>进行中</span><span id="sbActive">0</span></div>
    </div>
  </aside>
  <main class="main" id="mainContent"></main>
</div>
<div class="modal-overlay hidden" id="projectModal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3 id="modalTitle">新建项目</h3>
      <button class="close-btn" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-danger btn-sm hidden" id="deleteBtn" onclick="deleteProject()">删除</button>
      <button class="btn btn-outline" id="createFolderBtn" onclick="createLocalFolder()" title="需先启动本地服务器">📁 一键建文件夹</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveProject()">保存</button>
    </div>
  </div>
</div>
<div id="toastContainer"></div>

<script>
// ========== DATA LAYER ==========
const STORAGE_KEY = 'saika_photo_projects';
const SETTINGS_KEY = 'saika_photo_settings';

function loadProjects(){
  let arr;
  try{arr=JSON.parse(localStorage.getItem(STORAGE_KEY))||[]}catch(e){arr=[]}
  // 迁移：为历史上缺少 id 的项目补一个（修复建档后无法删除/打开的问题）
  let fixed=false;
  if(Array.isArray(arr)){
    arr.forEach(p=>{ if(p && !p.id){ p.id=genId(); fixed=true; } });
    if(fixed) saveProjects(arr);
  }
  return arr;
}
function saveProjects(data){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
}
function loadSettings(){
  try{return JSON.parse(localStorage.getItem(SETTINGS_KEY))||{photographer:'',social:''}}catch(e){return{photographer:'',social:''}}
}
function saveSettings(s){
  localStorage.setItem(SETTINGS_KEY,JSON.stringify(s));
}

// ========== 高德地图 ==========
let _amapPromise=null;
function ensureAmap(){
  const s=loadSettings();
  const key=s.amapKey, sec=s.amapSecurity;
  if(!key) return Promise.resolve(null);
  if(window.AMap) return Promise.resolve(window.AMap);
  if(_amapPromise) return _amapPromise;
  _amapPromise=new Promise((resolve)=>{
    try{window._AMapSecurityConfig={securityJsCode:sec||''};}catch(e){}
    const sc=document.createElement('script');

function geocodeCurrentLocation(){
  const cityEl=document.getElementById('fCity'), locEl=document.getElementById('fLocation');
  const city=cityEl?cityEl.value.trim():'', loc=locEl?locEl.value.trim():'';
  const addr=(city+' '+loc).trim()||loc;
  const statusEl=document.getElementById('geoStatus');
  if(!addr){if(statusEl)statusEl.textContent='请先填写城市/地点';return;}
  if(statusEl)statusEl.textContent='定位中…';
  ensureAmap().then(AMap=>{
    if(!AMap){if(statusEl)statusEl.textContent='未配置高德 Key（见设置页）';toast('⚠️ 请在设置页填写高德 Key');return;}
    const geocoder=new AMap.Geocoder();
    geocoder.getLocation(addr,(status,result)=>{
      if(status==='complete'&&result.geocodes&&result.geocodes.length){
        const L=result.geocodes[0].location;
        document.getElementById('fLat').value=L.lat;
        document.getElementById('fLng').value=L.lng;
        if(statusEl)statusEl.textContent='✅ 已定位';
        initLocationMap(L.lat,L.lng);
      }else{
        if(statusEl)statusEl.textContent='⚠️ 未找到，请更详细';
        toast('⚠️ 定位失败，换更详细地址（如：上海市黄浦区外滩）');
      }
    });
  });
}
function initLocationMap(lat,lng){
  const el=document.getElementById('mapPreview');
  if(!el)return;
  ensureAmap().then(AMap=>{
    if(!AMap){el.innerHTML='<span style="font-size:12px;color:#999">设置高德 Key 后显示地图</span>';return;}
    if(el._map){el._map.setZoomAndCenter([lng,lat]);if(el._marker)el._marker.setPosition([lng,lat]);return;}
    const map=new AMap.Map(el,{zoom:15,center:[lng,lat],resizeEnable:true});
    const marker=new AMap.Marker({position:[lng,lat],title:(document.getElementById('fLocation')||{}).value||'拍摄地'});
    map.add(marker);
    el._map=map; el._marker=marker;
  });
}

function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function toast(msg){const c=document.getElementById('toastContainer');const t=document.createElement('div');t.className='toast';t.textContent=msg;c.appendChild(t);setTimeout(()=>{t.classList.add('toast-out');setTimeout(()=>t.remove(),300)},2000)}
function fmtMoney(n){return '¥'+(n||0).toLocaleString('zh-CN')}
function fmtDate(d){if(!d)return '-';const dt=new Date(d);return dt.getMonth()+1+'月'+dt.getDate()+'日'}
function fmtDateFull(d){if(!d)return '-';const dt=new Date(d);return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0')}
function daysUntil(d){if(!d)return null;const t=new Date(d);const now=new Date();now.setHours(0,0,0,0);t.setHours(0,0,0,0);return Math.round((t-now)/86400000)}
function isProjectDone(p){
  const pw=['original','selected','color','final'];
  const vw=['original','selected','color','final'];
  const photoOk = p.deliverable.includes('照片') ? pw.every(s=>p.photoWorkflow[s].done) : true;
  const videoOk = p.deliverable.includes('视频') ? vw.every(s=>p.videoWorkflow[s].done) : true;
  return photoOk && videoOk;
}
function effectiveStatus(p){
  if(!p) return '';
  if(p.status==='已取消') return '已取消';
  if(p.status==='待确认') return '待确认';
  const auto = ((p.publishedPlatforms||[]).length>0)?'已发布':(isProjectDone(p)?'已完成':'进行中');
  const order={'进行中':1,'已完成':2,'已发布':3};
  if(order[p.status]!==undefined && order[p.status]>=order[auto]) return p.status;
  return auto;
}

function getBalance(p){return effectiveTotal(p)-getTotalPaid(p)}

const DEFAULT_PRICING={
  photoSingle:240, photoDouble:400, photoMinHours:2, photoIncluded:9, photoExtra:20,
  videoSingle:350, videoExtra:20,
  event4:120, event6:180, eventExtra:30,
  assistant:50, depositRatio:0.5
};
function getPricing(){
  const s=loadSettings();
  return Object.assign({},DEFAULT_PRICING,s.pricing||{});
}
function parseHours(str){const m=parseFloat((str||'').replace(/[^0-9.]/g,''));return isNaN(m)?0:m;}
function parseCount(str){const m=parseInt((str||'').replace(/[^0-9]/g,''),10);return isNaN(m)?0:m;}
// 根据预约表单数据 + 价格设置，估算总价/定金/尾款
function calcEstimate(d,pricing){
  if(!d)return {total:0,deposit:0,final:0,base:0,assist:0,breakdown:''};
  const type=d.shootType;
  const double_=d.personCount==='double';
  let base=0,assist=0,breakdown='';
  if(type==='video'){
    base=pricing.videoSingle; breakdown='视频 '+pricing.videoSingle;
    if(d.needAssistant==='yes'){assist=pricing.assistant;breakdown+=' + 摄助 '+pricing.assistant;}
  }else if(type==='event'){
    const cnt=parseCount(d.duration);
    if(cnt===4){base=pricing.event4;breakdown='场照 4图 '+pricing.event4;}
    else if(cnt===6){base=pricing.event6;breakdown='场照 6图 '+pricing.event6;}
    else if(cnt>0){base=cnt*pricing.eventExtra;breakdown='场照 '+cnt+'图×'+pricing.eventExtra;}
    else {base=pricing.event4;breakdown='场照（未填张数，按4图估算）'+pricing.event4;}
  }else{
    let hours=parseHours(d.duration);
    if(hours<=0)hours=pricing.photoMinHours;
    if(hours<pricing.photoMinHours)hours=pricing.photoMinHours;
    const rate=double_?pricing.photoDouble:pricing.photoSingle;
    base=Math.round(hours*rate);
    breakdown='正片 '+hours+'小时×'+rate+(double_?'(双人)':'')+'（含'+pricing.photoIncluded+'图调色）';
    if(d.needAssistant==='yes'){assist=pricing.assistant;breakdown+=' + 摄助 '+pricing.assistant;}
  }
  const total=base+assist;
  const deposit=Math.round(total*pricing.depositRatio);
  return {total,deposit,final:total-deposit,base,assist,breakdown};
}
function effectiveTotal(p){return (p.totalPrice||0)+(p.extraFee||0);}

function getWfProgress(p){
  let stages=[];

  }
  if(stages.length===0) return '未开始';
  const done=stages.filter(s=>s).length;
  return done+'/'+stages.length;
}

function setFilter(el,type){
  document.querySelectorAll(`.filter-chip[data-filter="${type}"]`).forEach(b=>b.classList.remove('active'));

function renderCard(p){
  const done=isProjectDone(p);
  const paid=getTotalPaid(p);
  const balance=getBalance(p);
  const shootTypeMap={场照:'🎪 场照',外景:'🌿 外景',棚拍:'🏠 棚拍'};
  const styleMap={cosplay:'COS',人像:'人像',商业:'商业',活动:'活动',其他:'其他'};
  const _st=effectiveStatus(p);
  const _stColor={'待确认':'#BA7517','进行中':'#185FA5','已完成':'#3B6D11','已发布':'#993556','已取消':'#A32D2D'}[_st]||'#5F5E5A';

  let photoProg='';
  if(p.deliverable.includes('照片')){
    const stages=['original','selected','color','final'];
    const sd=stages.filter(s=>p.photoWorkflow[s].done).length;
    photoProg=`<div class="card-wf"><div class="wf-label">📷 照片 ${sd}/4</div><div class="wf-stages">${stages.map((s,i)=>`${i>0?`<div class="wf-line${p.photoWorkflow[s].done?' done':''}"></div>`:''}<div class="wf-dot${p.photoWorkflow[s].done?' done':''}"></div>`).join('')}</div></div>`;
  }
  let videoProg='';
  if(p.deliverable.includes('视频')){
    const stages=['original','selected','color','final'];
    const sd=stages.filter(s=>p.videoWorkflow[s].done).length;
    videoProg=`<div class="card-wf"><div class="wf-label">🎬 视频 ${sd}/4</div><div class="wf-stages">${stages.map((s,i)=>`${i>0?`<div class="wf-line${p.videoWorkflow[s].done?' done':''}"></div>`:''}<div class="wf-dot${p.videoWorkflow[s].done?' done':''}"></div>`).join('')}</div></div>`;
  }

  return `<div class="project-card" onclick="openModal('${p.id}')">
    <div class="card-header">
      <div>
        <div class="card-title">${p.clientName}${p.role?' · '+p.role:''}</div>
        <div class="card-subtitle">${p.shootDate?fmtDate(p.shootDate):'未定日期'}${p.ip?' · '+p.ip:''}</div>
      </div>
      <div style="position:relative"><button class="card-menu" onclick="event.stopPropagation();toggleDropdown(event,'${p.id}')">⋯</button></div>
    </div>
    <div class="card-meta">
      <span class="tag" style="color:${_stColor};border-color:${_stColor}">${_st}</span>
      ${p.shootType?`<span class="tag">${shootTypeMap[p.shootType]||p.shootType}</span>`:''}
      ${p.styleType?`<span class="tag">${styleMap[p.styleType]||p.styleType}</span>`:''}
      ${p.location?`<span class="tag">${p.location}</span>`:''}
      ${p.deliverable.includes('照片')?'<span class="tag tag-green">📷</span>':''}
      ${p.deliverable.includes('视频')?'<span class="tag tag-green">🎬</span>':''}
      ${p.hasBTS?'<span class="tag">🎞️花絮</span>':''}
      ${done?'<span class="tag tag-accent">✓ 完成</span>':''}
    </div>
    ${photoProg}${videoProg}
    <div class="card-fin">
      <span class="fin-label">总价 ${fmtMoney(effectiveTotal(p))}${p.extraFee>0?` <span class="fin-unpaid" style="font-size:10px">＋加单${fmtMoney(p.extraFee)}</span>`:''}</span>
      <span class="fin-paid">已收 ${fmtMoney(paid)}</span>
      ${balance>0?`<span class="fin-unpaid">待收 ${fmtMoney(balance)}</span>`:'<span class="fin-paid" style="font-size:11px">✓ 已结清</span>'}
    </div>
    ${(p.selectPages&&p.selectPages.length)?`<div class="card-actions" onclick="event.stopPropagation()"><button class="btn btn-sm btn-secondary" onclick="window.open(${JSON.stringify(p.selectPages[p.selectPages.length-1].url)},'_blank')">📂 选图页 (${p.selectPages.length})</button></div>`:''}
  </div>`;
}

// ===== FINANCE =====
function renderFinance(main){
  const now=new Date();
  const y=now.getFullYear();
  const m=now.getMonth();

  // Monthly data for current year
  const monthData=[];
  for(let i=0;i<12;i++){
    const ym=y+'-'+String(i+1).padStart(2,'0');
    const mp=projects.filter(p=>p.shootDate&&p.shootDate.startsWith(ym));
    const income=mp.reduce((s,p)=>s+getTotalPaid(p),0);
    const orders=mp.length;
    monthData.push({month:i+1,income,orders});
  }

  const yearTotal=monthData.reduce((s,d)=>s+d.income,0);
  const yearOrders=monthData.reduce((s,d)=>s+d.orders,0);
  const avgPrice=yearOrders>0?Math.round(yearTotal/yearOrders):0;
  const monthIncome=monthData[m].income;

  let html=`<div class="main-header"><h2>财务</h2></div>`;

  html+=`<div class="fin-summary">
    <div class="fin-card"><div class="fc-label">本年度总收入</div><div class="fc-value">${fmtMoney(yearTotal)}</div><div class="fc-sub">${yearOrders} 单</div></div>
    <div class="fin-card"><div class="fc-label">本月收入</div><div class="fc-value">${fmtMoney(monthIncome)}</div><div class="fc-sub">${monthData[m].orders} 单</div></div>
    <div class="fin-card"><div class="fc-label">平均单价</div><div class="fc-value">${fmtMoney(avgPrice)}</div><div class="fc-sub">本年度</div></div>
    <div class="fin-card"><div class="fc-label">待收款总额</div><div class="fc-value">${fmtMoney(projects.filter(p=>effectiveStatus(p)==='进行中').reduce((s,p)=>s+getBalance(p),0))}</div><div class="fc-sub">${projects.filter(p=>getBalance(p)>0&&effectiveStatus(p)==='进行中').length} 单未结清</div></div>
  </div>`;

  // Bar chart
  const maxIncome=Math.max(...monthData.map(d=>d.income),1);
  html+=`<div class="fin-chart">
    <h3>${y}年 月度收入</h3>
    <div class="bar-chart">
      ${monthData.map(d=>{
        const h=Math.round(d.income/maxIncome*140);
        return `<div class="bar-col">
          <div class="bar-val">${d.income>0?fmtMoney(d.income):''}</div>
          <div class="bar" style="height:${h}px;${d.month===m+1?'background:var(--blue)':''}" title="${d.month}月: ${fmtMoney(d.income)} / ${d.orders}单"></div>
          <div class="bar-label">${d.month}月</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;

  // Recent transactions table
  const recent=projects.filter(p=>effectiveStatus(p)!=='待确认'&&effectiveStatus(p)!=='已取消').sort((a,b)=>new Date(b.shootDate||0)-new Date(a.shootDate||0)).slice(0,12);
  html+=`<div class="fin-chart">
    <h3>近期订单</h3>
    <table class="fin-table">
      <thead><tr><th>日期</th><th>客户</th><th>类型</th><th>总价</th><th>已收</th><th>待收</th><th>状态</th></tr></thead>
      <tbody>
        ${recent.map(p=>{
          const balance=getBalance(p);
          return `<tr onclick="openModal('${p.id}')" style="cursor:pointer">
            <td>${p.shootDate?fmtDate(p.shootDate):'-'}</td>
            <td>${p.clientName}</td>
            <td>${p.demandType||'-'}</td>
            <td>${fmtMoney(effectiveTotal(p))}</td>
            <td class="td-paid">${fmtMoney(getTotalPaid(p))}</td>
            <td class="${balance>0?'td-unpaid':'td-paid'}">${balance>0?fmtMoney(balance):'✓'}</td>
            <td>${(()=>{const s=effectiveStatus(p);const c={'待确认':'#BA7517','进行中':'#185FA5','已完成':'#3B6D11','已发布':'#993556','已取消':'#A32D2D'}[s]||'#5F5E5A';return `<span class="tag" style="color:${c};border-color:${c}">${s}</span>`;})()}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;

  main.innerHTML=html;
}

  const num=id=>{const el=document.getElementById(id);return el?parseFloat(el.value)||0:0;};

  s.pricing={
    photoSingle:num('setPhotoSingle'),
    photoDouble:num('setPhotoDouble'),
    photoMinHours:num('setPhotoMinHours'),
    photoIncluded:num('setPhotoIncluded'),
    photoExtra:num('setPhotoExtra'),
    videoSingle:num('setVideoSingle'),
    videoExtra:num('setVideoExtra'),
    event4:num('setEvent4'),
    event6:num('setEvent6'),
    eventExtra:num('setEventExtra'),
    assistant:num('setAssistant'),
    depositRatio:Math.min(100,Math.max(0,num('setDepositRatio')))/100

  toast('💰 价格已保存');

  const modal = document.getElementById('projectModal');
  const title = document.getElementById('modalTitle');
  const body = document.getElementById('modalBody');
  const deleteBtn = document.getElementById('deleteBtn');
  modal.classList.remove('hidden');

  let p = createEmptyProject();

  if(id){
    const found = projects.find(x=>x.id===id);
    if(found){p=JSON.parse(JSON.stringify(found));title.textContent='编辑项目';deleteBtn.classList.remove('hidden')}
    else{title.textContent='新建项目';deleteBtn.classList.add('hidden')}
  }else{
    title.textContent='新建项目';
    deleteBtn.classList.add('hidden');
  }

  // 预填数据（支持 string 日期或 object 字段映射）
  if(typeof prefill==='string'){
    p.shootDate=prefill;
  }else if(prefill && typeof prefill==='object'){
    if(prefill.fClientName) p.clientName=prefill.fClientName;
    if(prefill.fRole) p.role=prefill.fRole;
    if(prefill.fIP) p.ip=prefill.fIP;
    if(prefill.fShootDate) p.shootDate=prefill.fShootDate;
    if(prefill.fMediaType) p.mediaType=prefill.fMediaType;
    if(prefill.fContact) p.contact=prefill.fContact;
    if(prefill.fTotalPrice!=null) p.totalPrice=prefill.fTotalPrice;
    if(prefill.fBookingType) p.bookingType=prefill.fBookingType;
    if(prefill.fNotes) p.notes=(p.notes||'')+'\n'+prefill.fNotes;
  }

  moodKeywordsTmp = [...(p.moodKeywords||[])];
  window._selectPhotosTmp = [];
  body.innerHTML = renderForm(p);
  if(p.lat&&p.lng){ setTimeout(()=>initLocationMap(p.lat,p.lng), 60); }
  makeSectionsCollapsible(computeStage(p));
  if(localServer) updateSelectPhotoUI();
  modal.scrollTop = 0;
}

function computeStage(p){
  // 0预约 1定金 2策划 3拍摄 4后期 5交付
  let s=0;
  if((p.status!=='待确认' && p.status!=='已取消')||(p.deposit||0)>0) s=Math.max(s,1);
  const mb=p.moodBoard||{};
  if(p.location || p.routeLink || (mb.reference&&mb.reference.length) || (mb.pose&&mb.pose.length) || (p.moodKeywords&&p.moodKeywords.length)) s=Math.max(s,2);
  if(p.actualStart || p.shootNotes) s=Math.max(s,3);
  const wf=p.photoWorkflow||{};
  if((wf.selected&&wf.selected.done)||(wf.color&&wf.color.done)||(wf.final&&wf.final.done)) s=Math.max(s,4);
  if(p.archived || (p.publishedPlatforms&&p.publishedPlatforms.length>0)) s=Math.max(s,5);
  return s;
}
function renderProgressBar(stage, p){
  const labels=['预约','定金','策划','拍摄','后期','交付'];
  let nodes='';
  for(let i=0;i<6;i++){
    const isDone=i<stage, isActive=i===stage;
    const bg=isDone?'#7BA88E':(isActive?'var(--accent)':'#E8DFD0');
    const txt=isDone?'var(--text2)':(isActive?'var(--text)':'var(--text3)');
    const mark=isDone?'✓':(i+1);
    nodes+=`<div style="flex:1;text-align:center">
      <div style="width:26px;height:26px;line-height:26px;margin:0 auto;border-radius:50%;background:${bg};color:#fff;font-size:12px;font-weight:700">${mark}</div>
      <div style="font-size:10px;margin-top:3px;color:${txt}">${labels[i]}</div>
    </div>`;
    if(i<5) nodes+=`<div style="flex:0 0 14px;height:2px;margin-top:12px;background:${isDone?'#7BA88E':'#E8DFD0'}"></div>`;
  }
  const stTxt=effectiveStatus(p);
  const key=`${p.clientName||'未命名'}${p.shootDate?' · '+fmtDate(p.shootDate):''}${p.location?' · '+p.location:''} · ${stTxt}`;
  return `<div style="background:#FAFAF7;border:1px solid var(--border);border-radius:var(--radius);padding:12px 10px;margin-bottom:14px">
    <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px">📌 ${key}</div>
    <div style="display:flex;align-items:flex-start">${nodes}</div>
  </div>`;
}
function makeSectionsCollapsible(stage){
  document.querySelectorAll('#modalBody .form-section[data-stage]').forEach(sec=>{
    const idx=parseInt(sec.dataset.stage||'1');
    const title=sec.querySelector('.form-section-title');
    if(!title)return;
    title.style.cursor='pointer';
    if(getComputedStyle(title).display!=='flex') title.style.display='flex';
    title.style.justifyContent='space-between';
    title.style.alignItems='center';
    const chev=document.createElement('span');
    chev.textContent='▾'; chev.style.transition='transform .2s'; chev.style.color='var(--text3)';
    title.appendChild(chev);
    const children=[...sec.children].filter(c=>c!==title);
    const body=document.createElement('div'); body.className='sec-body';
    children.forEach(c=>body.appendChild(c));
    sec.appendChild(body);
    if(idx>stage){ body.style.display='none'; chev.style.transform='rotate(-90deg)'; }
    title.onclick=()=>{ const hid=body.style.display==='none'; body.style.display=hid?'':'none'; chev.style.transform=hid?'':'rotate(-90deg)'; };
  });
}

function uploadMoodImg(key, input){
  const file=input.files[0];
  if(!file)return;
  if(file.size>500000){
    toast('图片不能超过 500KB，请压缩后上传');
    return;
  }
  const reader=new FileReader();
  reader.onload=e=>{
    // Store in temp on the form element
    if(!window._moodTmp)window._moodTmp={};
    if(!window._moodTmp[key])window._moodTmp[key]=[];
    window._moodTmp[key]=[e.target.result]; // replace
    const slot=document.getElementById('mood_'+key);
    slot.innerHTML=`<img src="${e.target.result}"><button class="ms-remove" onclick="event.stopPropagation();removeMoodImg('${key}')">×</button>`;
  };
  reader.readAsDataURL(file);
}
function removeMoodImg(key){
  if(window._moodTmp&&window._moodTmp[key])delete window._moodTmp[key];
  const slot=document.getElementById('mood_'+key);
  slot.innerHTML=`<span class="ms-label">📷 上传</span>`;
}

function saveProject(){
  const v=id=>{const el=document.getElementById(id);return el?el.value:''};
  const chk=id=>{const el=document.getElementById(id);return el?el.checked:false};
  const num=id=>{const el=document.getElementById(id);return el?parseInt(el.value)||0:0};

  const clientName=v('fClientName').trim();
  if(!clientName){toast('请输入客户CN');return}

  const deliverable=v('fDeliverable');
  const publishedPlatforms=[...document.querySelectorAll('.pub-check:checked')].map(c=>c.dataset.platform);

  // Merge mood board
  const moodBoard={reference:[],pose:[],lighting:[],composition:[]};
  if(window._moodTmp){
    for(const key in moodBoard){
      if(window._moodTmp[key])moodBoard[key]=window._moodTmp[key];
    }
  }

  const project={
    status:v('fStatus'),
    clientName,contact:v('fContact'),demandType:v('fDemandType'),deliverable,
    totalPrice:num('fTotalPrice'),deposit:num('fDeposit'),finalPayment:num('fFinalPayment'),
    shootDate:v('fShootDate'),startTime:v('fStartTime'),endTime:v('fEndTime'),
    city:v('fCity'),location:v('fLocation'),lat:parseFloat(document.getElementById('fLat').value)||0,lng:parseFloat(document.getElementById('fLng').value)||0,routeLink:'',weather:v('fWeather'),
    role:v('fRole'),ip:v('fIP'),styleType:v('fStyleType'),shootType:v('fShootType'),
    moodKeywords:[...moodKeywordsTmp],moodBoard,
    actualStart:v('fActualStart'),actualEnd:v('fActualEnd'),shootNotes:v('fShootNotes'),hasBTS:chk('fBTS'),btsCount:num('fBTSCount'),btsNote:v('fBTSNote'),
    photoWorkflow:{
      original:{count:num('fPO'),done:chk('fPODone')},
      selected:{count:num('fPS'),done:chk('fPSDone')},
      color:{count:num('fPC'),done:chk('fPCDone')},
      final:{count:num('fPF'),done:chk('fPFDone')}
    },
    videoWorkflow:{
      original:{count:num('fVO'),done:chk('fVODone')},
      selected:{count:num('fVS'),done:chk('fVSDone')},
      color:{count:num('fVC'),done:chk('fVCDone')},
      final:{count:num('fVF'),done:chk('fVFDone')}
    },
    publishedPlatforms,
    archived:chk('fArchived'),cloudBackup:chk('fCloudBackup'),
    notes:v('fNotes'),storyboard:v('fStoryboard'),
    bookingType:p.bookingType,
    extraPhotos:num('fExtraPhotos'),
    extraUnit:num('fExtraUnit'),
    extraFee:(num('fExtraPhotos'))*(num('fExtraUnit')),
    updatedAt:new Date().toISOString()
    ,priceSnapshot:(editingId?(projects.find(x=>x.id===editingId)||{}).priceSnapshot:null)||Object.assign({},getPricing())
  };

  if(editingId){
    const idx=projects.findIndex(p=>p.id===editingId);
    if(idx>=0){project.id=editingId;project.createdAt=projects[idx].createdAt;projects[idx]=project}
  }else{
    project.id=genId();project.createdAt=new Date().toISOString();projects.unshift(project)
  }

  // Clean up temp
  window._moodTmp={};

  saveProjects(projects);
  closeModal();
  toast(editingId?'项目已更新':'项目已创建');
}

function deleteProject(){
  if(!editingId)return;
  if(!confirm('确定要删除这个项目吗？此操作不可撤销。'))return;
  projects=projects.filter(p=>p.id!==editingId);
  saveProjects(projects);
  closeModal();
  toast('项目已删除');
}

// 确认价格并建档（直接生成档案，status=已确认，进入定金阶段）
async function createProjectFromBooking(b){
  const d=b.data||b;
  const est=calcEstimate(d,getPricing());
  if(!confirm('确认价格为「'+(d.clientName||'未命名')+'」建档？\n预计总价 '+fmtMoney(est.total)+'（定金 '+fmtMoney(est.deposit)+' / 尾款 '+fmtMoney(est.final)+'）\n建档后该预约将从待办列表移除，进入「待收定金」阶段。'))return;
  const typeToMediaType={'photo':'照片','video':'视频','event':'照片'};
  const catLabel={sankeng:'三坑',daily:'日常',cosplay:'cosplay'}[d.category]||'';
  const role=d.category==='cosplay'?(d.character||''):(d.clothStyle||'');
  const ip=d.category==='cosplay'?(d.ipSource||''):'';
  const styleMap={sankeng:'其他',daily:'人像',cosplay:'cosplay'};
  const pr=getPricing();
  const isEvent=d.shootType==='event';
  const isVideo=d.shootType==='video';
  const extraUnitDef=isEvent?pr.eventExtra:(isVideo?pr.videoExtra:pr.photoExtra);
  const p=createEmptyProject();
  p.status='进行中';
  p.clientName=d.clientName||'';
  p.contact=d.wechat||'';
  p.role=role; p.ip=ip;
  p.styleType=styleMap[d.category]||'cosplay';
  p.shootDate=d.preferredDate||'';
  p.mediaType=typeToMediaType[d.shootType]||'照片';
  p.deliverable=p.mediaType;
  p.demandType=d.category==='cosplay'?'COS':(d.category==='daily'?'人像':'其他');
  p.totalPrice=est.total;
  p.estDeposit=est.deposit; p.estFinal=est.final;
  p.bookingType=d.shootType||'';
  p.extraUnit=extraUnitDef;
  p.priceSnapshot=Object.assign({},getPricing());
  p.notes=[d.notes||'', catLabel?('['+catLabel+']'):'', d.needAssistant==='yes'?'[需要摄助]':'', d.allowDisplay==='no'?'[请勿公开]':''].filter(Boolean).join(' ');
  p.createdAt=new Date().toISOString();
  p.updatedAt=p.createdAt;
  projects.unshift(p);
  saveProjects(projects);
  await deleteBooking(b.filename);
  toast('✅ 已建档：'+(p.clientName||'未命名')+'（待收定金 '+fmtMoney(est.deposit)+'）');
  render();
}
async function deleteBooking(filename){

    await fetch(API_BASE+'/api/booking-delete',{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({filename})});
    await loadPendingBookings();
  }catch(e){console.error(e)}

function toggleDropdown(e,id){

async function createLocalFolder(){
  if(!localServer){toast('请先启动本地服务器 (python3 server.py)');return;}
  const v=id=>{const el=document.getElementById(id);return el?el.value.trim():''};
  const date=v('fShootDate');

    const r=await fetch('/api/create-folder',{
      method:'POST',
      headers:{'Content-Type':'application/json'},

let _folderOverlay=null;
async function loadFromFolder(){
  try{

    const projectList=await r.json();
    if(!projectList.length){toast('档案目录中还没有项目文件夹，请先用 create_folders.py 创建');return;}
    if(_folderOverlay){_folderOverlay.remove();}
    _folderOverlay=document.createElement('div');
    _folderOverlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
    const modal=document.createElement('div');
    modal.style.cssText='background:#fff;border-radius:12px;width:100%;max-width:500px;max-height:80vh;overflow-y:auto;padding:20px';
    let html='<div style="font-size:15px;font-weight:700;margin-bottom:12px">选择项目文件夹</div>';
    projectList.forEach(p=>{
      const info=Object.entries(p.imageCounts||{}).map(([k,v])=>k+'('+v+'张)').join(' / ')||'暂无图片';
      html+='<div class="folder-item" data-relpath="'+p.relPath+'" style="padding:10px 12px;border:1px solid var(--border);border-radius:6px;margin-bottom:6px;cursor:pointer"><div style="font-size:13px;font-weight:600">'+p.name+'</div><div style="font-size:11px;color:var(--text3);margin-top:2px">'+info+'</div></div>';
    });
    html+='<button class="btn btn-secondary btn-sm" style="margin-top:8px" id="folderCancel">取消</button>';
    modal.innerHTML=html;
    _folderOverlay.appendChild(modal);
    _folderOverlay.onclick=e=>{if(e.target===_folderOverlay){_folderOverlay.remove();_folderOverlay=null;}};
    modal.querySelector('#folderCancel').onclick=()=>{_folderOverlay.remove();_folderOverlay=null;};
    modal.querySelectorAll('.folder-item').forEach(item=>{
      item.onmouseover=function(){this.style.background='#F5F5F5'};
      item.onmouseout=function(){this.style.background=''};
      item.onclick=()=>selectFolderProject(item.dataset.relpath);
    });
    document.body.appendChild(_folderOverlay);
  }catch(e){toast('无法连接本地服务器');}
}

async function selectFolderProject(relPath){
  try{
    const r=await fetch('/api/projects');
    const projectList=await r.json();
    const proj=projectList.find(p=>p.relPath===relPath);
    if(!proj){toast('未找到该项目');return;}
    const folders=proj.subfolders||[];
    if(!folders.length){toast('该项目没有子文件夹');return;}
    if(!_folderOverlay)return;
    const modal=_folderOverlay.firstElementChild;
    let html='<div style="font-size:15px;font-weight:700;margin-bottom:4px">选择子文件夹</div>';
    html+='<div style="font-size:12px;color:var(--text3);margin-bottom:8px">'+proj.name+'</div>';
    folders.forEach(f=>{
      const cnt=proj.imageCounts[f]||0;
      html+='<div class="subfolder-item" data-fullpath="'+relPath+'/'+f+'" style="padding:10px 12px;border:1px solid var(--border);border-radius:6px;margin-bottom:6px;cursor:pointer"><div style="font-size:13px;font-weight:600">'+f+'</div><div style="font-size:11px;color:var(--text3)">'+(cnt>0?cnt+' 张图片':'空文件夹')+'</div></div>';
    });
    html+='<button class="btn btn-secondary btn-sm" style="margin-top:8px" id="folderBack">返回</button>';
    modal.innerHTML=html;
    modal.querySelector('#folderBack').onclick=()=>loadFromFolder();
    modal.querySelectorAll('.subfolder-item').forEach(item=>{
      item.onmouseover=function(){this.style.background='#F5F5F5'};
      item.onmouseout=function(){this.style.background=''};
      item.onclick=()=>loadFolderImages(item.dataset.fullpath);
    });
  }catch(e){toast('读取失败');}
}

async function loadFolderImages(fullRelPath){
  if(_folderOverlay){_folderOverlay.remove();_folderOverlay=null;}
  toast('正在加载图片...');
  try{
    const r=await fetch('/api/files?path='+encodeURIComponent(fullRelPath));
    const data=await r.json();
    const images=(data.files||[]).filter(f=>f.isImage);
    if(!images.length){toast('该文件夹没有可显示的图片（RAW文件不支持预览，请放入JPG）');return;}
    window._selectPhotosTmp=images.map((img,i)=>({id:'folder_'+i,name:img.name,relPath:img.relPath,fromFolder:true}));
    refreshSelectThumbs();
    toast('已加载 '+images.length+' 张图片');
  }catch(e){toast('加载图片失败');}
}

// ========== IMAGE PROCESSING ==========
async function processImage(src,maxEdge){
  maxEdge=maxEdge||600;
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.crossOrigin='anonymous';
    img.onload=()=>{
      let w=img.naturalWidth,h=img.naturalHeight;
      if(w>h){if(w>maxEdge){h=h*maxEdge/w;w=maxEdge;}}
      else{if(h>maxEdge){w=w*maxEdge/h;h=maxEdge;}}
      w=Math.round(w);h=Math.round(h);
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      ctx.save();
      ctx.translate(w/2,h/2);
      ctx.rotate(-Math.PI/6);
      const fs=Math.max(14,Math.round(w/20));
      ctx.font='bold '+fs+'px -apple-system,"PingFang SC",sans-serif';
      ctx.fillStyle='rgba(255,255,255,0.25)';
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillText('SAIKA · 彩華',0,0);
      ctx.restore();
      resolve(canvas.toDataURL('image/jpeg',0.72));
    };
    img.onerror=reject;
    img.src=src;
  });
}

// ========== GENERATE PHOTO SELECT PAGE ==========
async function generatePhotoSelectPage(){
  const photos=window._selectPhotosTmp||[];
  const clientName=document.getElementById('fClientName')?.value||'客户';
  if(!photos.length){
    if(localServer){toast('请先点击「从本地文件夹加载」选择照片');}
    else{toast('请先点击「选择照片」上传图片');}
    return;
  }
  const btn=event?.target;
  if(btn){btn.disabled=true;btn.textContent='⏳ 正在处理...';}
  try{
    const processedImages=[];
    for(let i=0;i<photos.length;i++){
      const p=photos[i];
      let src=p.fromFolder?('/api/image?path='+encodeURIComponent(p.relPath)):URL.createObjectURL(p.file);
      const dataUrl=await processImage(src,600);
      processedImages.push({num:i+1,dataUrl,name:p.name||p.file?.name||('照片'+(i+1))});
      if(btn)btn.textContent='⏳ 处理中 '+(i+1)+'/'+photos.length+'...';
    }
    const html=generateSelectPageHTML(clientName,processedImages);
    const filename=clientName+'_选图预览页.html';

    // 尝试保存到服务器
    if(localServer){
      try{
        const resp=await fetch('/api/save-select-page',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({filename:filename,html:html})
        });
        const result=await resp.json();
        if(result.ok&&result.url){
          archiveSelectPage(result.url,clientName);
          showSelectPageURL(result.url,clientName);
          return;
        }
      }catch(e){console.warn('保存到服务器失败，回退到下载',e);}
    }

    // 回退：下载文件
    const blob=new Blob([html],{type:'text/html;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=filename;a.click();
    URL.revokeObjectURL(url);
    toast('已下载 HTML 文件（服务器未运行，无法生成链接）');
  }catch(e){console.error(e);toast('生成失败：'+e.message);}
  finally{if(btn){btn.disabled=false;btn.textContent='🖼️ 生成选图预览页';}}
}

function archiveSelectPage(url,clientName){
  if(!editingId)return;
  const idx=projects.findIndex(p=>p.id===editingId);
  if(idx<0)return;
  const p=projects[idx];
  p.selectPages=p.selectPages||[];
  if(!p.selectPages.some(s=>s.url===url)){
    p.selectPages.push({url,clientName,createdAt:new Date().toISOString()});
    saveProjects(projects);
    toast('已存档选图页到项目归档');
  }
}

function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(!Array.isArray(data)){toast('无效的备份文件');return}
      if(!confirm('即将导入 '+data.length+' 个项目，当前 '+projects.length+' 个项目将被覆盖。确定？'))return;
      projects=data;saveProjects(projects);toast('已导入 '+data.length+' 个项目');render();
    }catch(err){toast('文件格式错误')}
  };
  reader.readAsText(file);
}
